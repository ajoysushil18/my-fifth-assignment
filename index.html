
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Issues Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F8FAFC] flex items-center justify-center h-screen">

<div class="bg-white w-[420px] p-10 rounded-xl shadow-md">


<div class="flex justify-center mb-6">
<img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" class="w-14">
</div>

<h1 class="text-center text-2xl font-bold mb-1">
GitHub Issues Tracker
</h1>

<p class="text-center text-gray-500 mb-6">
Track and manage your project issues
</p>
<input
id="username"
type="text"
placeholder="Username"
class="w-full border border-gray-300 rounded-lg p-3 mb-3 focus:outline-none focus:ring-2 focus:ring-black">

<input
id="password"
type="password"
placeholder="Password"
class="w-full border border-gray-300 rounded-lg p-3 mb-4 focus:outline-none focus:ring-2 focus:ring-black">

<button
onclick="login()"
class="w-full bg-black text-white py-3 rounded-lg font-medium hover:bg-gray-900">
Sign In
</button>

<p class="text-center text-sm text-gray-400 mt-4">
Demo: admin / admin123
</p>
</div>
<script src="script.js"></script>
</body>
</html>
