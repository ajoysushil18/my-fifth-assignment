<!DOCTYPE html>
<html>

<head>

<title>Issues Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<nav class="bg-white shadow p-4 flex justify-between">

<h1 class="font-bold text-xl">
GitHub Issues Tracker
</h1>

<div>

<input
id="searchInput"
class="border p-2 rounded"
placeholder="Search issues">

<button
onclick="searchIssues()"
class="bg-black text-white px-4 py-2 rounded">
Search
</button>

</div>

</nav>


<div class="flex gap-4 p-6">

<button
id="allTab"
onclick="filterIssues('all')"
class="tab px-4 py-2 bg-black text-white rounded">

All (<span id="allCount">0</span>)

</button>

<button
id="openTab"
onclick="filterIssues('open')"
class="tab px-4 py-2 bg-gray-200 rounded">

Open (<span id="openCount">0</span>)

</button>

<button
id="closedTab"
onclick="filterIssues('closed')"
class="tab px-4 py-2 bg-gray-200 rounded">

Closed (<span id="closedCount">0</span>)

</button>

</div>



<div id="loader"
class="flex justify-center hidden">

<div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black"></div>

</div>



<div
id="issuesContainer"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-6">

</div>


<!-- MODAL -->

<div
id="modal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white p-6 rounded w-96">

<h2 id="modalTitle"
class="text-xl font-bold mb-2"></h2>

<p id="modalDesc"
class="text-gray-600 mb-3"></p>

<p id="modalAuthor"></p>
<p id="modalStatus"></p>
<p id="modalPriority"></p>
<p id="modalLabel"></p>
<p id="modalDate"></p>

<button onclick="closeModal()"
class="bg-black text-white px-4 py-2 rounded mt-4">
Close
</button>

</div>

</div>
<script src="script.js"></script>

</body>
</html>
