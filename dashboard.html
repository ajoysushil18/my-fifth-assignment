
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Issues Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#F8FAFC]">


<nav class="bg-white border-b px-8 py-4 flex justify-between items-center">

<div class="flex items-center gap-2">

<img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" class="w-8">

<h1 class="font-semibold text-lg">
GitHub Issues Tracker
</h1>

</div>

<div class="flex gap-2">

<input
id="searchInput"
placeholder="Search issues..."
class="border px-3 py-2 rounded-lg w-[220px]">

<button
onclick="searchIssues()"
class="bg-black text-white px-4 py-2 rounded-lg">
Search
</button>

</div>

</nav>



<div class="px-8 mt-6 flex gap-3">

<button id="allTab"
onclick="filterIssues('all')"
class="tab bg-black text-white px-4 py-2 rounded-lg">
All
</button>

<button id="openTab"
onclick="filterIssues('open')"
class="tab bg-gray-200 px-4 py-2 rounded-lg">
Open
</button>

<button id="closedTab"
onclick="filterIssues('closed')"
class="tab bg-gray-200 px-4 py-2 rounded-lg">
Closed
</button>

</div>

<div
id="issuesContainer"
class="px-8 mt-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

</div>

<div
id="modal"
class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

<div class="bg-white w-[420px] p-6 rounded-xl">

<h2 id="modalTitle" class="text-xl font-bold mb-2"></h2>

<p id="modalDesc" class="text-gray-500 mb-4"></p>

<div class="text-sm space-y-1">

<p id="modalAuthor"></p>
<p id="modalStatus"></p>
<p id="modalPriority"></p>
<p id="modalLabel"></p>
<p id="modalDate"></p>

</div>

<button
onclick="closeModal()"
class="bg-black text-white px-4 py-2 rounded-lg mt-4">
Close
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
